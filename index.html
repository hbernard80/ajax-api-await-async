<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ajax - Démo</title>
    <meta name="robots" content="none">
    <meta name="referrer" content="no-referrer">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preload" href="public/assets/css/app.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="public/assets/css/app.css"></noscript>        
</head>
<body>
    <div class="container">
        <h1 class="border-bottom pb-2">Ajax démo : régions et départements</h1>
        <p>Listes déroulantes liées (= dynamiques = imbriquées) : la sélection d'une valeur dans la 1<sup>ère</sup> liste déclenche une requête Ajax pour aller chercher en base de données les valeurs liées.</p>
        <form action="#" method="POST">
            <div class="row mb-3">
                <label for="region" class="col-sm-2 col-form-label">Région</label>
                <div class="col-sm-10">
                    <select name="region" id="region" class="form-select form-select-lg">
                        <option value="" disabled selected>Sélectionnez une région</option>
                        <!-- Autres options alimentées par la requête Ajax -->
                    </select>
                </div>
             </div>            
             <div class="row mb-3">
                <label name="dept" for="dept" class="col-sm-2 col-form-label">Département</label>
                <div class="col-sm-10">
                    <select id="dept" class="form-select form-select-lg">
                        <option value="" disabled selected>Sélectionnez un département</option>
                        <!-- Autres options alimentées par la requête Ajax -->
                    </select>
                </div>
             </div>         
             <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2 text-center">
                    <button type="submit" class="btn btn-dark">Envoyer</button>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <script src="public/assets/js/app.js" defer></script>  
</body>
</html>
